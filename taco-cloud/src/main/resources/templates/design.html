<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th:"http://www.thymeleaf.org">
    <head>
        <title>Taco Cloud</title>
    </head>
    <body>
        <h1>Design your Taco</h1>
        <img th:src="@{/images/taco.png}"/>
        <form method ="POST" th:object="${taco}">
        <div class="grid"></h3>
            <h3>Pick your your Wrap:</h3>
            <div class ="ingredient-group" id="wraps">
                <div th:each = "ingredient : ${wrap}">
                    <input th:field="*{ingredients}" type = "checkbox" th:value = "${ingredient.id}">
                    <span th:text="${ingredient.name}">Ingredient</span><br/>
                </div>
            </div>
        </div>

         <div class="grid"></h3>
            <h3>Pick your your Protein:</h3>
            <div class ="ingredient-group" id="proteins">
                <div th:each = "ingredient : ${protein}">
                    <input th:field="*{ingredients}" type = "checkbox" th:value = "${ingredient.id}">
                    <span th:text="${ingredient.name}">Ingredient</span><br/>
                </div>
            </div>
        </div>
         <div class="grid"></h3>
            <h3>Pick your your Cheese:</h3>
            <div class ="ingredient-group" id="cheese">
                <div th:each = "ingredient : ${cheese}">
                    <input th:field="*{ingredients}" type = "checkbox" th:value = "${ingredient.id}">
                    <span th:text="${ingredient.name}">Ingredient</span><br/>
                </div>
            </div>
        </div>
            <div class="grid"></h3>
            <h3>Pick your your Veggies:</h3>
            <div class ="ingredient-group" id="veggies">
                <div th:each = "ingredient : ${veggies}">
                    <input th:field="*{ingredients}" type = "checkbox" th:value = "${ingredient.id}">
                    <span th:text="${ingredient.name}">Ingredient</span><br/>
                </div>
            </div>
        </div>
         <div class="grid"></h3>
            <h3>Pick your your Sauce:</h3>
            <div class ="ingredient-group" id="sauces">
                <div th:each = "ingredient : ${sauce}">
                    <input th:field="*{ingredients}" type = "checkbox" th:value = "${ingredient.id}">
                    <span th:text="${ingredient.name}">Ingredient</span><br/>
                </div>
            </div>
        </div>
        <div>
            <h3>Name your Taco:</h3>
            <input type="text" th:field="*{name}"/>
        </div>
        <div>
            <input type="submit" value="Submit Taco"/>
        </div>
    </body>
</html>
